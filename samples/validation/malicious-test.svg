<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 300 120" width="300" height="120">
  <!-- サニタイズ確認用: script / style / 外部参照 / onload は除去され、図形だけ描画されるはず -->
  <script>alert('xss')</script>
  <style>@import url("https://example.com/track.css"); .leak { fill: url("https://example.com/fill.svg"); }</style>
  <rect x="10" y="10" width="280" height="100" rx="12" fill="#e11d48" onload="alert('x')"/>
  <image href="https://example.com/track.png" x="0" y="0" width="40" height="40"/>
  <rect class="leak" x="0" y="0" width="20" height="20" fill="url(https://example.com/fill.svg)"/>
  <text x="150" y="75" font-size="48" fill="#fff" text-anchor="middle">SAFE</text>
</svg>
